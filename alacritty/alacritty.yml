working_directory: ~
window:
  opacity: 0.90
  padding:
    x: 10
    y: 10
  class:
    instance: Alacritty
    general: Alacritty
  scroling:
    history: 10000
    multiplier: 3
font:
  normal:
    family: VictorMono Nerd Font
    style: Semibold
  bold:
      family: VictorMono Nerd Font #FantasqueSansMono Nerd Font Mono
      style: Bold
  italic:
      family: VictorMono Nerd Font #FantasqueSansMono Nerd Font Mono
      style: Medium Italic
  bold_italic:
      family: VictorMono Nerd Font #FantasqueSansMono Nerd Font Mono
      style: Bold Italic
  size: 13
draw_bold_text_with_bright_colors: false

# Colors (Customized Theme)
colors:
  primary:
    background: "#181818"
    foreground: "#ffffff"
  normal:
    black: "#32344a"
    red: "#f7768e"
    green: "#9ece6a"
    yellow: "#e0af68"
    blue: "#4fc1ff"
    magenta: "#ad8ee6"
    cyan: "#449dab"
    white: "#787c99"
  bright:
    black: "#444b6a"
    red: "#ff7a93"
    green: "#b9f27c"
    yellow: "#ff9e64"
    blue: "#7da6ff"
    magenta: "#bb9af7"
    cyan: "#0db9d7"
    white: "#acb0d0"

