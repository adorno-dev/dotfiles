cursor:
  style:
    shape: Underline
    blinking: Off
    blink-interval: 750
selection:
  save_to_clipboard: true
live_config_reload: true
shell:
  program: /usr/bin/zsh
key_bindings:
  - { key: Return, mods: Super|Shift, action: SpawnNewInstance }
  - { key: Insert, mods: Shift,	      action: Paste }
  - { key: Insert, mods: Control,	  action: Copy }
mouse_bindings:
  - { mouse: Middle, action: PasteSelection }
