for_window [class="code"] floating enable

for_window [class="^.*"] border pixel 1
new_window 1pixel
default_floating_border none
default_floating_border normal 0
hide_edge_borders smart

for_window [class=pulse] floating enable, resize set 1000 600, move scratchpad, border pixel 0
for_window [class=nvidia-settings] floating enable, resize set 1000 600, move scratchpad, border pixel 0
for_window [class=pavucontrol] floating enable, resize set 1000 600, move scratchpad, border pixel 0
